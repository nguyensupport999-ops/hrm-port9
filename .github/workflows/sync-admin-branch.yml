name: Sync admin branch with main

# Mục đích: mỗi khi có commit mới trên nhánh `main`, tự động làm cho nhánh
# `admin` GIỐNG HỆT `main` (ghi đè hoàn toàn nội dung admin bằng main). Nhờ
# vậy, bạn CHỈ CẦN sửa code (kể cả sửa bug) ở nhánh `main` — nhánh `admin`
# (dùng để chạy app quản trị/demo trên Streamlit) sẽ tự nhận bản vá mà
# không cần thao tác gì thêm.
#
# LƯU Ý: Đây là đồng bộ MỘT CHIỀU (main -> admin). Tuyệt đối không sửa code
# trực tiếp trên nhánh `admin` — mọi thay đổi riêng trên admin sẽ bị ghi đè
# mất sau lần chạy tiếp theo.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync-admin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ép admin giống hệt main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Đẩy thẳng nhánh main (đang được checkout sẵn) để ghi đè nhánh
          # admin trên remote. Dùng --force vì mục tiêu là admin PHẢI giống
          # hệt main, không quan tâm admin đang có gì khác biệt.
          git push origin HEAD:admin --force
